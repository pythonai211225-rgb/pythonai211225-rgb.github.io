<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Bridge Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="left-panel">
      <h1>SQL Bridge Runner</h1>
      <p class="sub">Pick one answer each turn. Hero jumps from left to right.</p>

      <div class="card question-card">
        <h2 id="qTitle">Column 1 / 8</h2>
        <p id="questionText">Loading question...</p>
      </div>

      <div id="answers" class="answers" aria-label="Answer choices"></div>

      <div class="stats card">
        <p><strong>Position:</strong> <span id="posText">Start</span></p>
        <p><strong>Status:</strong> <span id="statusText">Playing</span></p>
      </div>

      <div class="actions">
        <button id="restartBtn" type="button">Restart</button>
      </div>
    </section>

    <section class="board-panel">
      <div class="board-wrap">
        <img src="game.png" alt="Bridge board art" class="board-image" />
        <div id="grid" class="grid" aria-hidden="true"></div>
        <img id="hero" class="hero" src="hero.png" alt="Hero character" />
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
