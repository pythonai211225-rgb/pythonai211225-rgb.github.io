<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Stair Sprint – Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Reload block overlay - prevents white screen flash -->
  <div id="reloadBlockOverlay" class="reload-block-overlay hidden" aria-hidden="true"></div>

  <!-- Login overlay -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <h1>SQL Stair Sprint</h1>
      <p class="login-sub">Multiplayer</p>
      <form id="loginForm" autocomplete="off">
        <label for="nameInput">Your name</label>
        <input id="nameInput" type="text" maxlength="20" placeholder="Enter your name..." autofocus />
        <p id="nameError" class="name-error hidden"></p>
        <button type="submit">Join Game</button>
      </form>
    </div>
  </div>

  <main class="shell">
    <section class="sidebar">
      <h1>SQL Stair Sprint <span class="multi-badge">MP</span></h1>
      <section class="card score-card">
        <h2><img src="./gold.png" class="score-coin-icon" alt=""> Gold</h2>
        <div class="score-display">
          <span id="scoreValue" class="score-value">0</span>
        </div>
      </section>
      <section class="card timer-card">
        <h2>Timer</h2>
        <div class="timer-display" id="timerValue">00:00</div>
      </section>
      <div id="lobbyBar" class="lobby-bar"></div>
      <div id="onlineText" class="online-text"></div>
      <div id="eventConsole" class="event-console sidebar-console">
        <div id="eventLog" class="event-log"></div>
      </div>
    </section>

    <section class="board-panel">
      <div id="gameBoard" class="board">
        <div id="maze" class="maze" aria-label="SQL floor maze"></div>
        <div id="player" class="player video-hidden" aria-label="Your player"><span class="player-name"></span></div>
        <div id="ghost" class="ghost hidden" aria-hidden="true"></div>
        <div id="ghost2" class="ghost hidden" aria-hidden="true"></div>
        <div id="flash" class="flash"></div>
        <div id="stairVideoFrame" class="stair-video-frame hidden" aria-hidden="true">
          <video id="stairVideo" src="./go_up.mp4" preload="auto" playsinline></video>
        </div>
        <div id="questionPanel" class="question-panel hidden" role="dialog" aria-modal="true" aria-labelledby="questionTitle">
          <div class="question-card">
            <p id="doorTopic" class="door-topic"></p>
            <h2 id="questionTitle">Checkpoint Question</h2>
            <p id="questionText"></p>
            <div id="questionTables" class="question-tables hidden" aria-live="polite">
              <p class="question-tables-label">Tables</p>
              <div id="questionTableNames" class="question-table-names"></div>
              <div id="questionTablePreview" class="question-table-preview hidden"></div>
            </div>
            <div id="answers" class="answers"></div>
            <div id="paySkipWrap" class="pay-skip-wrap hidden">
              <button id="paySkipBtn" type="button" class="pay-skip-btn"></button>
              <p id="paySkipHint" class="pay-skip-hint"></p>
            </div>
          </div>
        </div>
        <div id="finalVideoFrame" class="final-video-frame hidden" aria-hidden="true">
          <video id="finalVideo" src="./trophy.mp4" preload="auto" playsinline></video>
        </div>
        <div id="gameOverPanel" class="game-over-panel hidden" aria-hidden="true">
          <h2>Game Over</h2>
          <p>Reached Level 4</p>
          <p class="game-over-score">Final Score: <span id="finalScoreValue">0</span></p>
          <p class="game-over-time">Final Time: <span id="finalTimeValue">00:00</span></p>
        </div>
        <div id="refreshConfirmModal" class="refresh-confirm-modal hidden" role="dialog" aria-modal="true">
          <div class="refresh-confirm-content">
            <h2>Restart Game?</h2>
            <p>Refreshing will restart your game and reset your progress on this run.</p>
            <div class="refresh-confirm-buttons">
              <button id="refreshCancelBtn" type="button" class="btn-cancel">Cancel</button>
              <button id="refreshConfirmBtn" type="button" class="btn-confirm">Restart Game</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>
  <script src="app.js"></script>
</body>
</html>
