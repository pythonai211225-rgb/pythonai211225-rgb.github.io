<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice — Rehearsal Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050d1a;
    --surface: #0d1b2e;
    --surface2: #122236;
    --border: #1a2f4a;
    --accent: #06b6d4;
    --accent-glow: rgba(6,182,212,0.18);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --red: #f56565;
    --red-bg: rgba(245,101,101,0.1);
    --amber: #f6ad55;
    --amber-bg: rgba(246,173,85,0.1);
    --text: #e2e8f0;
    --muted: #7fa8c9;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(6,182,212,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6,182,212,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 0.4rem;
  }

  .topic-pills {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .topic-pill {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 99px;
    background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.2);
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .progress-wrap {
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #3b82f6, #8b5cf6);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: slideUp 0.45s ease both;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: var(--accent-glow);
    border-radius: 50%;
    pointer-events: none;
    filter: blur(40px);
  }

  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .q-topic {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge.easy   { background: var(--green-bg); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .badge.medium { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(246,173,85,0.2); }
  .badge.hard   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(245,101,101,0.2); }

  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .q-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  .q-code {
    background: #040c17;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-family: var(--mono);
    font-size: 13px;
    color: #93c5fd;
    line-height: 1.7;
    margin-bottom: 1.5rem;
    white-space: pre;
    overflow-x: auto;
    position: relative;
  }

  .q-code::before {
    content: 'sql';
    position: absolute;
    top: 8px; right: 12px;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    font-family: var(--sans);
    width: 100%;
  }

  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(6,182,212,0.06);
    transform: translateX(3px);
  }

  .opt:active:not(:disabled) { transform: scale(0.99); }

  .opt-letter {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    animation: pulse-green 0.4s ease;
  }
  .opt.correct .opt-letter { background: var(--green); color: #050d1a; }

  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: shake 0.35s ease;
  }
  .opt.wrong .opt-letter { background: var(--red); color: #050d1a; }

  .opt.reveal {
    border-color: var(--green);
    background: var(--green-bg);
    opacity: 0.7;
  }
  .opt.reveal .opt-letter { background: var(--green); color: #050d1a; }

  .opt:disabled { cursor: default; transform: none !important; }

  .feedback {
    margin-top: 1.25rem;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }
  .feedback.correct-fb { background: var(--green-bg); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .feedback.wrong-fb   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(245,101,101,0.2); }

  .fb-icon { font-size: 18px; }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--sans);
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .btn:hover:not(:disabled) { background: var(--surface); border-color: var(--muted); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #050d1a;
    font-weight: 700;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn.primary:hover:not(:disabled) { background: #22d3ee; border-color: #22d3ee; }
  .btn:active:not(:disabled) { transform: scale(0.97); }

  .score-pill {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .results {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    animation: slideUp 0.5s ease both;
  }

  .results-emoji { font-size: 56px; margin-bottom: 1rem; }

  .score-display {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-label {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-val.g { color: var(--green); }
  .stat-val.r { color: var(--red); }
  .stat-val.a { color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .restart-btn {
    padding: 12px 32px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #050d1a;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: 0 0 24px var(--accent-glow);
    transition: background 0.2s, transform 0.1s;
  }
  .restart-btn:hover { background: #22d3ee; }
  .restart-btn:active { transform: scale(0.97); }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    margin-top: 20px;
    font-family: var(--mono);
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-green {
    0%  { box-shadow: 0 0 0 0 rgba(62,207,142,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(62,207,142,0); }
    100%{ box-shadow: none; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    60%     { transform: translateX(6px); }
    80%     { transform: translateX(-3px); }
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">SQL Practice</div>
    <h1>Rehearsal Questions</h1>
    <p class="subtitle">20 questions · slides 01 – 06</p>
    <div class="topic-pills">
      <span class="topic-pill">Intro</span>
      <span class="topic-pill">Data Types</span>
      <span class="topic-pill">Constraints</span>
      <span class="topic-pill">SELECT</span>
      <span class="topic-pill">Aggregations</span>
      <span class="topic-pill">JOINs</span>
      <span class="topic-pill">Normalization</span>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-text">0 / 20</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="q-view"></div>
  <div id="result-view" class="hidden"></div>

  <div class="nav" id="nav-bar">
    <button class="btn" id="btn-back" onclick="go(-1)">← Back</button>
    <span class="score-pill" id="score-pill">0 correct</span>
    <button class="btn primary" id="btn-next" onclick="goNext()">Next →</button>
  </div>

  <div style="text-align:center">
    <a href="../../index.html" class="back-link">← Back to SQL Course</a>
  </div>
</div>

<script>
const questions = [
  // ── SLIDE 01: Introduction ──────────────────────────────────────────────
  {
    q: "What does SQL stand for?",
    options: ["Structured Query Language", "Simple Question Language", "Sequential Query Logic", "Structured Question Layer"],
    answer: 0, level: "easy", topic: "Slide 01 · Introduction"
  },
  {
    q: "Which command adds a new row to a table?",
    options: ["ADD INTO", "UPDATE", "INSERT INTO", "CREATE ROW"],
    answer: 2, level: "easy", topic: "Slide 01 · Introduction"
  },
  {
    q: "What does this query return?",
    code: "SELECT * FROM students;",
    options: ["Only the first row", "All columns and all rows", "Only the column names", "The count of all rows"],
    answer: 1, level: "easy", topic: "Slide 01 · Introduction"
  },
  {
    q: "Which command permanently removes a table and all its data?",
    options: ["DELETE TABLE students", "REMOVE TABLE students", "DROP TABLE students", "CLEAR TABLE students"],
    answer: 2, level: "easy", topic: "Slide 01 · Introduction"
  },

  // ── SLIDE 02: Data Types & Constraints ─────────────────────────────────
  {
    q: "Which constraint prevents a column from storing NULL values?",
    options: ["UNIQUE", "NOT NULL", "DEFAULT", "CHECK"],
    answer: 1, level: "easy", topic: "Slide 02 · Constraints"
  },
  {
    q: "What does this column definition enforce?",
    code: "salary REAL CHECK (salary > 0)",
    options: ["The default salary is 0 if empty", "Only positive values can be inserted", "The column cannot be NULL", "Salary is auto-incremented"],
    answer: 1, level: "medium", topic: "Slide 02 · Constraints"
  },
  {
    q: "A column is defined as shown. What happens when you insert a duplicate email?",
    code: "email TEXT UNIQUE NOT NULL",
    options: ["The duplicate is silently ignored", "The existing row is updated", "The insert fails with a constraint error", "Both rows are stored and flagged"],
    answer: 2, level: "medium", topic: "Slide 02 · Constraints"
  },
  {
    q: "Which SQLite data type stores True / False values?",
    options: ["BOOL", "BOOLEAN", "INTEGER (0 or 1)", "BIT"],
    answer: 2, level: "medium", topic: "Slide 02 · Data Types"
  },

  // ── SLIDE 03: SELECT — Filter & Sort ───────────────────────────────────
  {
    q: "Which WHERE clause finds all products whose name starts with 'S'?",
    options: ["WHERE name = 'S%'", "WHERE name LIKE 'S%'", "WHERE name STARTS 'S'", "WHERE name IN ('S%')"],
    answer: 1, level: "easy", topic: "Slide 03 · LIKE"
  },
  {
    q: "What does this query return?",
    code: "SELECT name FROM products\nWHERE price BETWEEN 10 AND 50;",
    options: ["Products where price > 10 and price < 50", "Products where price >= 10 and price <= 50", "Products where price equals 10 or 50", "Products outside the range 10 – 50"],
    answer: 1, level: "easy", topic: "Slide 03 · BETWEEN"
  },
  {
    q: "How do you find all employees with no department assigned?",
    options: ["WHERE dept = NULL", "WHERE dept = 'NULL'", "WHERE dept IS NULL", "WHERE dept NOT EXISTS"],
    answer: 2, level: "medium", topic: "Slide 03 · NULL"
  },
  {
    q: "What does ORDER BY score DESC, name ASC do?",
    options: ["Sorts by score lowest first, then name Z→A", "Sorts by score highest first; ties broken alphabetically by name", "Sorts by name first, then score", "Filters rows where score descends"],
    answer: 1, level: "medium", topic: "Slide 03 · ORDER BY"
  },

  // ── SLIDE 04: Aggregations ─────────────────────────────────────────────
  {
    q: "What does COUNT(*) return?",
    options: ["The sum of all values in a column", "The total number of rows", "The average of all values", "The number of columns"],
    answer: 1, level: "easy", topic: "Slide 04 · Aggregations"
  },
  {
    q: "What does this query produce?",
    code: "SELECT dept, COUNT(*) AS total\nFROM employees\nGROUP BY dept;",
    options: ["Total number of all employees", "Number of employees per department", "Names of all distinct departments", "All employees sorted alphabetically"],
    answer: 1, level: "medium", topic: "Slide 04 · GROUP BY"
  },
  {
    q: "What is the key difference between WHERE and HAVING?",
    options: ["WHERE filters rows before aggregation; HAVING filters after", "HAVING filters before aggregation; WHERE filters after", "They are identical — either can be used", "WHERE works only on text; HAVING only on numbers"],
    answer: 0, level: "medium", topic: "Slide 04 · HAVING"
  },
  {
    q: "What does this query return?",
    code: "SELECT dept, AVG(salary) AS avg_sal\nFROM employees\nGROUP BY dept\nHAVING AVG(salary) > 5000;",
    options: ["Departments where at least one salary exceeds 5000", "All individual employees earning over 5000", "Departments whose average salary exceeds 5000", "The single highest average salary"],
    answer: 2, level: "hard", topic: "Slide 04 · HAVING"
  },

  // ── SLIDE 05: JOINs ────────────────────────────────────────────────────
  {
    q: "Which JOIN returns only rows that have a matching record in BOTH tables?",
    options: ["LEFT JOIN", "INNER JOIN", "FULL OUTER JOIN", "CROSS JOIN"],
    answer: 1, level: "easy", topic: "Slide 05 · JOINs"
  },
  {
    q: "Table employees has 3 rows. Employee 'Rina' has NULL as dept_id. An INNER JOIN with departments runs on dept_id. How many rows are returned?",
    options: ["3 — all employees including Rina", "2 — only employees with a matching department", "4 — all employees plus all departments", "0 — NULL dept_id blocks the whole join"],
    answer: 1, level: "medium", topic: "Slide 05 · INNER JOIN"
  },
  {
    q: "What does a LEFT JOIN guarantee?",
    options: ["Only matching rows from both tables", "All rows from the right table, NULL for unmatched left rows", "All rows from the left table, NULL for unmatched right columns", "A cartesian product of both tables"],
    answer: 2, level: "medium", topic: "Slide 05 · LEFT JOIN"
  },

  // ── SLIDE 06: Relationships & Normalization ────────────────────────────
  {
    q: "A table stores multiple phone numbers in a single column. Which Normal Form does this violate?",
    code: "phones TEXT  →  '054-111, 052-222, 050-333'",
    options: ["3NF — transitive dependency", "2NF — partial dependency on the key", "1NF — each cell must hold one atomic value", "BCNF — non-key dependency"],
    answer: 2, level: "medium", topic: "Slide 06 · Normalization"
  }
];

const LETTERS = ['A','B','C','D'];
let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = Math.round(answered / questions.length * 100);
  document.getElementById('prog-text').textContent = `${answered} / ${questions.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  const correct = userAnswers.filter((a, i) => a === questions[i].answer).length;
  document.getElementById('score-pill').textContent = `${correct} correct`;
}

function render() {
  const q = questions[current];
  const answered = userAnswers[current] !== null;
  const userChoice = userAnswers[current];
  const isCorrect = userChoice === q.answer;

  const optionsHTML = q.options.map((opt, i) => {
    let cls = 'opt';
    if (answered) {
      if (i === q.answer && i === userChoice) cls += ' correct';
      else if (i === userChoice) cls += ' wrong';
      else if (i === q.answer) cls += ' reveal';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>${opt}
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    feedbackHTML = isCorrect
      ? `<div class="feedback correct-fb"><span class="fb-icon">✓</span> Correct!</div>`
      : `<div class="feedback wrong-fb"><span class="fb-icon">✗</span> Wrong — the correct answer is <strong>${q.options[q.answer]}</strong></div>`;
  }

  const body = q.code
    ? `<div class="q-code">${q.code}</div>`
    : `<div class="q-text">${q.q}</div>`;

  const questionText = q.code ? `<div class="q-text">${q.q}</div>` : '';

  document.getElementById('q-view').innerHTML = `
    <div class="q-card">
      <div class="q-top">
        <span class="q-topic">${q.topic}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-number">${current + 1} / ${questions.length}</span>
          <span class="badge ${q.level}">${q.level}</span>
        </div>
      </div>
      ${q.code ? `<div class="q-text">${q.q}</div>` : ''}
      ${body}
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
    </div>`;

  document.getElementById('btn-back').disabled = current === 0;

  const answered = userAnswers[current] !== null;
  const isLast = current === questions.length - 1;
  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = !answered;
  if (isLast) {
    btnNext.textContent = 'See Results';
    btnNext.onclick = showResults;
  } else {
    btnNext.textContent = 'Next →';
    btnNext.onclick = goNext;
  }

  updateProgress();
}

function choose(i) {
  if (userAnswers[current] !== null) return;
  userAnswers[current] = i;
  render();
}

function goNext() {
  if (current < questions.length - 1) { current++; render(); }
}

function go(dir) {
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

function showResults() {
  const correct = userAnswers.filter((a, i) => a === questions[i].answer).length;
  const wrong   = userAnswers.filter((a, i) => a !== null && a !== questions[i].answer).length;
  const skipped = userAnswers.filter(a => a === null).length;
  const pct = Math.round(correct / questions.length * 100);
  const emoji = pct >= 85 ? '🏆' : pct >= 60 ? '👍' : '📚';
  const msg   = pct >= 85 ? 'Excellent — you know your SQL!' : pct >= 60 ? 'Good effort, keep reviewing!' : 'Keep studying — you got this!';

  document.getElementById('q-view').classList.add('hidden');
  document.getElementById('nav-bar').classList.add('hidden');
  document.getElementById('result-view').classList.remove('hidden');
  document.getElementById('result-view').innerHTML = `
    <div class="results">
      <div class="results-emoji">${emoji}</div>
      <div class="score-display">${correct}/${questions.length}</div>
      <div class="score-label">${pct}% · ${msg}</div>
      <div class="result-grid">
        <div class="stat-box"><div class="stat-val g">${correct}</div><div class="stat-label">CORRECT</div></div>
        <div class="stat-box"><div class="stat-val r">${wrong}</div><div class="stat-label">WRONG</div></div>
        <div class="stat-box"><div class="stat-val a">${skipped}</div><div class="stat-label">SKIPPED</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">Try Again</button>
    </div>`;
}

function restart() {
  current = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('q-view').classList.remove('hidden');
  document.getElementById('nav-bar').classList.remove('hidden');
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('result-view').innerHTML = '';
  render();
}

render();
</script>
</body>
</html>
