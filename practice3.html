<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Topics Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .quiz-box {
      width: 100%;
      max-width: 800px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.6;
      white-space: pre-line;
    }

    .answers button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
      text-align: left;
    }

    .answers button.correct {
      background: #d4edda;
      border-color: green;
    }

    .answers button.wrong {
      background: #f8d7da;
      border-color: red;
    }

    .feedback {
      margin-top: 15px;
      font-weight: bold;
    }

    .next-btn {
      margin-top: 15px;
      padding: 10px 15px;
      background: blue;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="quiz-box">
  <h1>Python Practice Quiz</h1>
  <div id="counter"></div>
  <div id="question" class="question"></div>
  <div id="answers" class="answers"></div>
  <div id="feedback" class="feedback"></div>
  <button id="next" class="next-btn" disabled>Next</button>
</div>

<script>
const questions = [
{
question: "number = -3\n\nif number > 0:\n    print('positive')\nelse:\n    print('not positive')\n\nWhat will be printed?",
answers: ["positive","not positive","0","error"],
correct: 1
},
{
question: "Which operator checks if BOTH conditions are true?",
answers: ["or","not","and","="],
correct: 2
},
{
question: "for i in range(5):\n\nHow many times does this loop run?",
answers: ["4","5","6","0"],
correct: 1
},
{
question: "You want to keep asking input until user enters 0\n\nWhich loop should you use?",
answers: ["while","for","if","match"],
correct: 0
},
{
question: "What is the last digit of 248?",
answers: ["2","4","8","24"],
correct: 2
},
{
question: "x = 8\n\nx % 2 == 0\n\nWhat does this mean?",
answers: ["odd","even","prime","negative"],
correct: 1
},
{
question: "Grade must be between 0–100\n\nWhat to do with 135?",
answers: ["accept","fix to 100","ignore","average"],
correct: 2
},
{
question: "What does break do?",
answers: ["skip","stop loop","restart","print"],
correct: 1
},
{
question: "Loop until -1\n\nShould -1 be included in sum?",
answers: ["yes","no","only first","depends"],
correct: 1
},
{
question: "Which checks digits only?",
answers: ["isdigit","isupper","islower","split"],
correct: 0
},
{
question: "Which checks uppercase?",
answers: ["upper","isdigit","isupper","lower"],
correct: 2
},
{
question: "'Hello world'.split()\n\nWhat is result?",
answers: ["['Hello','world']","string","list of letters","error"],
correct: 0
},
{
question: "len([10,20,30,40]) = ?",
answers: ["3","4","40","10"],
correct: 1
},
{
question: "Even numbers from [1,2,3,4,5,6]?",
answers: ["[1,3,5]","[2,4,6]","[1,2,3]","[4,5,6]"],
correct: 1
},
{
question: "List: [100,97,95,90]\n\n3rd biggest unique?",
answers: ["95","97","90","100"],
correct: 0
},
{
question: "Code [7,2,5]\nUser enters wrong number\n\nWhat happens?",
answers: ["continue","reset","ignore","sum"],
correct: 1
},
{
question: "Which is prime?",
answers: ["9","15","17","21"],
correct: 2
},
{
question: "rows=2 cols=4\n\nOutput?",
answers: ["****\\n****","**\\n**\\n**\\n**","****","*\\n*\\n*"],
correct: 0
},
{
question: "quick=True\nexpensive=False\n\nOutput?",
answers: ["not recommended","recommended","invalid","none"],
correct: 1
},
{
question: "Volume = 9\n\nOutput?",
answers: ["quiet","medium","max","invalid"],
correct: 2
}
];

let index = 0;
let score = 0;

const qText = document.getElementById("question");
const ansDiv = document.getElementById("answers");
const feedback = document.getElementById("feedback");
const nextBtn = document.getElementById("next");
const counter = document.getElementById("counter");

function loadQuestion(){
  const q = questions[index];
  qText.textContent = q.question;
  counter.textContent = `Question ${index+1}/20 | Score: ${score}`;
  ansDiv.innerHTML = "";
  feedback.textContent = "";
  nextBtn.disabled = true;

  q.answers.forEach((a,i)=>{
    const btn = document.createElement("button");
    btn.textContent = a;
    btn.onclick = ()=>check(i,btn);
    ansDiv.appendChild(btn);
  });
}

function check(i,btn){
  const q = questions[index];
  const buttons = ansDiv.querySelectorAll("button");

  buttons.forEach(b=>b.disabled=true);

  if(i===q.correct){
    btn.classList.add("correct");
    feedback.textContent = "Correct ✅";
    score++;
  } else {
    btn.classList.add("wrong");
    buttons[q.correct].classList.add("correct");
    feedback.textContent = `Wrong ❌ Correct answer: ${q.answers[q.correct]}`;
  }

  nextBtn.disabled = false;
}

nextBtn.onclick = ()=>{
  index++;
  if(index<questions.length){
    loadQuestion();
  } else {
    qText.textContent = "Finished!";
    ansDiv.innerHTML = "";
    feedback.textContent = `Final score: ${score}/20`;
    nextBtn.style.display = "none";
  }
};

loadQuestion();
</script>

</body>
</html>
