<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Basics — Table of Contents</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #fdf6e3;
    --paper:   #fffbf0;
    --ink:     #2d2013;
    --muted:   #9c8866;
    --border:  #e8dcc8;
    --amber:   #d97706;
    --red:     #c0392b;
    --green:   #2d6a4f;
    --blue:    #1e4d8c;
    --teal:    #0f766e;
    --term-bg: #1a1209;
    --term-fg: #f0d080;
    --term-dim:#8a6c30;
    --shadow:  rgba(45,32,19,.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── NOISE TEXTURE ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── FLOATING PARTICLES ── */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 4rem 2rem 2.5rem;
    border-bottom: 2px solid var(--border);
    background: var(--paper);
    box-shadow: 0 4px 24px var(--shadow);
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      var(--border) 27px,
      var(--border) 28px
    );
    opacity: 0.4;
    pointer-events: none;
  }

  .header-badge {
    display: inline-block;
    background: var(--term-bg);
    color: var(--term-fg);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 1rem;
    border-radius: 2px;
    margin-bottom: 1.5rem;
    animation: fade-in 0.6s ease both;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: var(--ink);
    animation: slide-down 0.7s cubic-bezier(.16,1,.3,1) both;
    animation-delay: 0.1s;
  }

  h1 span {
    color: var(--amber);
    position: relative;
    display: inline-block;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--amber);
    border-radius: 2px;
    animation: underline-grow 0.8s cubic-bezier(.16,1,.3,1) both;
    animation-delay: 0.7s;
    transform-origin: left;
  }

  @keyframes underline-grow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  .subtitle {
    margin-top: 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    animation: fade-in 0.8s ease both;
    animation-delay: 0.4s;
  }

  .progress-bar-wrap {
    margin: 2rem auto 0;
    max-width: 320px;
    background: var(--border);
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    animation: fade-in 0.8s ease both;
    animation-delay: 0.6s;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--amber), var(--red));
    border-radius: 3px;
    animation: fill-bar 1.5s cubic-bezier(.16,1,.3,1) both;
    animation-delay: 0.8s;
  }

  @keyframes fill-bar {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* ── MAIN GRID ── */
  main {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.5rem;
    padding-left: 0.5rem;
    border-left: 3px solid var(--amber);
    animation: fade-in 0.6s ease both;
    animation-delay: 0.9s;
  }

  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    color: inherit;
    padding: 1.5rem 1.4rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    box-shadow: 3px 3px 0 var(--border);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s cubic-bezier(.16,1,.3,1),
                box-shadow 0.2s cubic-bezier(.16,1,.3,1),
                border-color 0.2s ease;

    opacity: 0;
    animation: card-in 0.5s cubic-bezier(.16,1,.3,1) both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--amber));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(.16,1,.3,1);
  }

  .card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 6px 6px 0 var(--card-accent, var(--amber));
    border-color: var(--card-accent, var(--amber));
  }

  .card:hover::before {
    transform: scaleX(1);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--card-accent, var(--amber));
    opacity: 0.8;
  }

  .card-icon {
    font-size: 2rem;
    line-height: 1;
    filter: grayscale(0.2);
    transition: transform 0.3s cubic-bezier(.16,1,.3,1);
  }

  .card:hover .card-icon {
    transform: scale(1.2) rotate(-5deg);
  }

  .card-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
  }

  .card-topics {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    margin-top: 0.2rem;
  }

  .card-topics li {
    font-size: 0.72rem;
    color: var(--muted);
    padding-left: 0.9rem;
    position: relative;
    line-height: 1.4;
  }

  .card-topics li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--card-accent, var(--amber));
    font-weight: 700;
  }

  .card-arrow {
    margin-top: auto;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--card-accent, var(--amber));
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: gap 0.2s ease;
  }

  .card:hover .card-arrow {
    gap: 0.8rem;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    border-top: 1.5px solid var(--border);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    background: var(--paper);
  }

  footer code {
    background: var(--term-bg);
    color: var(--term-fg);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    font-size: 0.75rem;
  }

  /* ── KEYFRAMES ── */
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slide-down {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SNAKE DECORATION ── */
  .snake-deco {
    display: block;
    text-align: center;
    font-size: 3rem;
    margin: 2.5rem 0 1rem;
    animation: wiggle 3s ease-in-out infinite;
    opacity: 0;
    animation: wiggle 3s ease-in-out infinite, fade-in 0.8s ease 1.2s both;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg) scale(1); }
    50%       { transform: rotate(5deg) scale(1.08); }
  }
</style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Header -->
<header>
  <div class="header-badge">📘 PYTHON BASICS · COMPLETE COURSE</div>
  <h1>Table of<br><span>Contents</span></h1>
  <p class="subtitle">10 chapters · hands-on interactive lessons · beginner-friendly</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar"></div>
  </div>
</header>

<!-- Main -->
<main>
  <div class="snake-deco">🐍</div>
  <p class="section-label">All Chapters</p>

  <div class="toc-grid" id="toc"></div>
</main>

<footer>
  Built with <code>Python</code> · Interactive lessons · Click any card to begin
</footer>

<script>
  const chapters = [
    {
      num: "01",
      icon: "⌨️",
      title: "Input & Print",
      file: "python_basic1.html",
      accent: "#d97706",
      topics: ["print() function", "input() function", "int(input()) — type casting", "Building your first program"]
    },
    {
      num: "02",
      icon: "🔀",
      title: "Conditions",
      file: "python_basic2.html",
      accent: "#c0392b",
      topics: ["if / elif / else", "Comparison operators", "match / case statement", "Live grade calculator"]
    },
    {
      num: "03",
      icon: "🔁",
      title: "Loops",
      file: "python_basic3.html",
      accent: "#0f766e",
      topics: ["while loop", "while True + break", "for x in list", "range(), enumerate()"]
    },
    {
      num: "04",
      icon: "📋",
      title: "Lists",
      file: "python_basic4.html",
      accent: "#7c3aed",
      topics: ["Creating & indexing lists", "append, remove, pop", "Slicing", "List comprehensions"]
    },
    {
      num: "05",
      icon: "🔤",
      title: "Strings",
      file: "python_basic5.html",
      accent: "#0891b2",
      topics: ["Ways to create a string", "Indexing & slicing", "String methods", "f-strings & formatting"]
    },
    {
      num: "06",
      icon: "🔵",
      title: "Sets",
      file: "python_basic6.html",
      accent: "#0369a1",
      topics: ["Unique unordered collections", "add, remove, discard", "Union & intersection", "Set operations"]
    },
    {
      num: "07",
      icon: "📦",
      title: "Tuples",
      file: "python_basic7.html",
      accent: "#b45309",
      topics: ["Immutable sequences", "Packing & unpacking", "Named tuples", "When to use tuples"]
    },
    {
      num: "08",
      icon: "🗂️",
      title: "Dictionaries",
      file: "python_basic8.html",
      accent: "#15803d",
      topics: ["Key-value pairs", "get, update, pop", "Iterating dicts", "Dict comprehensions"]
    },
    {
      num: "09",
      icon: "🧩",
      title: "Functions",
      file: "python_basic9.html",
      accent: "#9333ea",
      topics: ["def & return", "Parameters vs arguments", "Default values", "Scope & docstrings"]
    },
    {
      num: "10",
      icon: "🛡️",
      title: "Try / Except",
      file: "python_basicA.html",
      accent: "#dc2626",
      topics: ["try / except / else / finally", "Catching specific errors", "Raising exceptions", "Writing safe programs"]
    }
  ];

  const toc = document.getElementById('toc');

  chapters.forEach((ch, i) => {
    const card = document.createElement('a');
    card.href = ch.file;
    card.className = 'card';
    card.style.setProperty('--card-accent', ch.accent);
    card.style.animationDelay = (0.1 * i + 1.0) + 's';

    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="card-num">CHAPTER ${ch.num}</span>
        <span class="card-icon">${ch.icon}</span>
      </div>
      <div class="card-title">${ch.title}</div>
      <ul class="card-topics">
        ${ch.topics.map(t => `<li>${t}</li>`).join('')}
      </ul>
      <div class="card-arrow">Open chapter <span>→</span></div>
    `;

    toc.appendChild(card);
  });

  // Particles
  const colors = ['#d97706','#c0392b','#0f766e','#7c3aed','#0369a1','#15803d'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.width = p.style.height = (4 + Math.random() * 6) + 'px';
    container.appendChild(p);
  }
</script>
</body>
</html>
