<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #7c6ef5;
    --accent-glow: rgba(124,110,245,0.18);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --red: #f56565;
    --red-bg: rgba(245,101,101,0.1);
    --amber: #f6ad55;
    --amber-bg: rgba(246,173,85,0.1);
    --text: #e8e8f0;
    --muted: #7a7a92;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* bg grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,110,245,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,110,245,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8e8f0 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 0.4rem;
  }

  /* progress */
  .progress-wrap {
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    animation: slideUp 0.45s ease both;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    background: var(--accent-glow);
    border-radius: 50%;
    pointer-events: none;
    filter: blur(40px);
  }

  .q-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .q-topic {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge.easy   { background: var(--green-bg); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .badge.medium { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(246,173,85,0.2); }
  .badge.hard   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(245,101,101,0.2); }

  .q-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .q-text {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  .q-code {
    background: #0d0d10;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-family: var(--mono);
    font-size: 13px;
    color: #c3c0f0;
    line-height: 1.7;
    margin-bottom: 1.5rem;
    white-space: pre;
    overflow-x: auto;
    position: relative;
  }

  .q-code::before {
    content: 'python';
    position: absolute;
    top: 8px; right: 12px;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    font-family: var(--sans);
  }

  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(124,110,245,0.06);
    transform: translateX(3px);
  }

  .opt:active:not(:disabled) { transform: scale(0.99); }

  .opt-letter {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .opt.correct {
    border-color: var(--green);
    background: var(--green-bg);
    animation: pulse-green 0.4s ease;
  }
  .opt.correct .opt-letter { background: var(--green); color: #0f0f13; }

  .opt.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    animation: shake 0.35s ease;
  }
  .opt.wrong .opt-letter { background: var(--red); color: #0f0f13; }

  .opt.reveal {
    border-color: var(--green);
    background: var(--green-bg);
    opacity: 0.7;
  }
  .opt.reveal .opt-letter { background: var(--green); color: #0f0f13; }

  .opt:disabled { cursor: default; transform: none !important; }

  /* feedback banner */
  .feedback {
    margin-top: 1.25rem;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }
  .feedback.correct-fb { background: var(--green-bg); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
  .feedback.wrong-fb   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(245,101,101,0.2); }

  .fb-icon { font-size: 18px; }

  /* nav */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    animation: fadeDown 0.5s 0.2s ease both;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--sans);
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .btn:hover:not(:disabled) { background: var(--surface); border-color: var(--muted); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn.primary:hover:not(:disabled) { background: #9080ff; border-color: #9080ff; }
  .btn:active:not(:disabled) { transform: scale(0.97); }

  .score-pill {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* results */
  .results {
    text-align: center;
    padding: 3rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    animation: slideUp 0.5s ease both;
  }

  .results-emoji { font-size: 56px; margin-bottom: 1rem; }

  .score-display {
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .score-label {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-val.g { color: var(--green); }
  .stat-val.r { color: var(--red); }
  .stat-val.a { color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .restart-btn {
    padding: 12px 32px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--sans);
    box-shadow: 0 0 24px var(--accent-glow);
    transition: background 0.2s, transform 0.1s;
  }
  .restart-btn:hover { background: #9080ff; }
  .restart-btn:active { transform: scale(0.97); }

  /* animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-green {
    0%  { box-shadow: 0 0 0 0 rgba(62,207,142,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(62,207,142,0); }
    100%{ box-shadow: none; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    60%     { transform: translateX(6px); }
    80%     { transform: translateX(-3px); }
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Python Practice</div>
    <h1>Try / Except / Finally</h1>
    <p class="subtitle">20 questions · error handling in Python</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-text">0 / 20</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div id="q-view"></div>
  <div id="result-view" class="hidden"></div>

  <div class="nav" id="nav-bar">
    <button class="btn" id="btn-back" onclick="go(-1)">← Back</button>
    <span class="score-pill" id="score-pill">0 correct</span>
    <button class="btn primary" id="btn-next" onclick="goNext()">Next →</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "What is the purpose of a try/except block in Python?",
    options: [
      "To speed up code execution",
      "To catch and handle errors so the program does not crash",
      "To define a new function",
      "To repeat code until it works"
    ],
    answer: 1, level: "easy", topic: "Concept"
  },
  {
    q: "What is printed?\n\ntry:\n    print('hello')\nexcept:\n    print('error')",
    code: true,
    options: ["error", "hello", "hello\nerror", "Nothing"],
    answer: 1, level: "easy", topic: "Basic try/except"
  },
  {
    q: "What is printed?\n\ntry:\n    x = int('abc')\n    print('ok')\nexcept:\n    print('caught')",
    code: true,
    options: ["ok", "caught", "ok\ncaught", "Error and crash"],
    answer: 1, level: "easy", topic: "ValueError"
  },
  {
    q: "What does the finally block do?",
    options: [
      "Runs only when an error occurs",
      "Runs only when no error occurs",
      "Always runs, whether or not an error occurred",
      "Stops the program"
    ],
    answer: 2, level: "easy", topic: "finally"
  },
  {
    q: "What is printed?\n\ntry:\n    print(1 / 0)\nexcept ZeroDivisionError:\n    print('cannot divide by zero')\nfinally:\n    print('done')",
    code: true,
    options: [
      "cannot divide by zero",
      "done",
      "cannot divide by zero\ndone",
      "Error and crash"
    ],
    answer: 2, level: "easy", topic: "try/except/finally"
  },
  {
    q: "What is printed?\n\ntry:\n    x = 10 / 2\n    print(x)\nexcept ZeroDivisionError:\n    print('error')\nfinally:\n    print('finished')",
    code: true,
    options: [
      "error\nfinished",
      "5.0\nfinished",
      "5.0",
      "finished"
    ],
    answer: 1, level: "easy", topic: "No error path"
  },
  {
    q: "What error type is raised when you try to convert a non-numeric string to int?",
    options: ["TypeError", "ValueError", "NameError", "IndexError"],
    answer: 1, level: "easy", topic: "Exception types"
  },
  {
    q: "What is printed?\n\ntry:\n    nums = [1, 2, 3]\n    print(nums[10])\nexcept IndexError:\n    print('index out of range')\nexcept:\n    print('other error')",
    code: true,
    options: [
      "other error",
      "index out of range",
      "None",
      "Error and crash"
    ],
    answer: 1, level: "medium", topic: "IndexError"
  },
  {
    q: "What is printed?\n\ntry:\n    x = int(input('enter: '))\nexcept ValueError:\n    print('not a number')\nfinally:\n    print('always runs')\n\n(assume the user types: 'hello')",
    code: true,
    options: [
      "not a number",
      "always runs",
      "not a number\nalways runs",
      "Error and crash"
    ],
    answer: 2, level: "medium", topic: "finally + ValueError"
  },
  {
    q: "What is printed?\n\ntry:\n    print('start')\n    raise ValueError('oops')\n    print('end')\nexcept ValueError as e:\n    print(e)",
    code: true,
    options: [
      "start\nend",
      "start\noops",
      "oops",
      "start\nValueError"
    ],
    answer: 1, level: "medium", topic: "raise & as"
  },
  {
    q: "What happens when an except block does NOT match the raised error type?",
    options: [
      "The error is silently ignored",
      "The finally block runs and the error is re-raised",
      "Python tries the next except block, and if none match the program crashes",
      "The program restarts from the beginning"
    ],
    answer: 2, level: "medium", topic: "Unmatched exception"
  },
  {
    q: "What is printed?\n\ntry:\n    d = {'a': 1}\n    print(d['b'])\nexcept KeyError:\n    print('key not found')\nexcept TypeError:\n    print('type error')\nfinally:\n    print('end')",
    code: true,
    options: [
      "type error\nend",
      "key not found\nend",
      "key not found",
      "Error and crash"
    ],
    answer: 1, level: "medium", topic: "KeyError"
  },
  {
    q: "What is printed?\n\ndef divide(a, b):\n    try:\n        return a / b\n    except ZeroDivisionError:\n        return -1\n    finally:\n        print('called')\n\nprint(divide(10, 2))",
    code: true,
    options: [
      "5.0",
      "called\n5.0",
      "5.0\ncalled",
      "-1\ncalled"
    ],
    answer: 1, level: "hard", topic: "finally in function"
  },
  {
    q: "What is printed?\n\ntry:\n    x = int('5')\n    y = 10 / x\n    print(y)\nexcept ValueError:\n    print('bad value')\nexcept ZeroDivisionError:\n    print('zero division')\nfinally:\n    print('done')",
    code: true,
    options: [
      "2.0\ndone",
      "bad value\ndone",
      "zero division\ndone",
      "2.0"
    ],
    answer: 0, level: "medium", topic: "Multiple except"
  },
  {
    q: "What is printed?\n\ntry:\n    x = int('0')\n    print(10 // x)\nexcept ValueError:\n    print('value error')\nexcept ZeroDivisionError:\n    print('zero error')\nfinally:\n    print('finally')",
    code: true,
    options: [
      "value error\nfinally",
      "zero error\nfinally",
      "0\nfinally",
      "zero error"
    ],
    answer: 1, level: "hard", topic: "Multiple except + finally"
  },
  {
    q: "What is a good pattern for safely reading a number from the user in a loop?",
    options: [
      "while True: x = input(); if x.isdigit(): break",
      "while True:\n    try:\n        x = int(input())\n        break\n    except ValueError:\n        print('try again')",
      "try: x = int(input()) except: pass",
      "x = int(input()) or 0"
    ],
    answer: 1, level: "hard", topic: "Input validation loop"
  },
  {
    q: "What is printed?\n\ntry:\n    raise TypeError('wrong type')\nexcept ValueError:\n    print('value error')\nexcept TypeError:\n    print('type error')\nexcept:\n    print('other')\nfinally:\n    print('done')",
    code: true,
    options: [
      "other\ndone",
      "value error\ndone",
      "type error\ndone",
      "Error and crash"
    ],
    answer: 2, level: "hard", topic: "Exception order"
  },
  {
    q: "What is printed?\n\ndef risky():\n    try:\n        return 'try'\n    finally:\n        return 'finally'\n\nprint(risky())",
    code: true,
    options: ["try", "finally", "try\nfinally", "Error"],
    answer: 1, level: "hard", topic: "finally overrides return"
  },
  {
    q: "What is printed?\n\nerrors = 0\nvalues = ['10', 'abc', '5', '!!', '3']\nfor v in values:\n    try:\n        print(int(v))\n    except ValueError:\n        errors += 1\nprint('errors:', errors)",
    code: true,
    options: [
      "10\n5\n3\nerrors: 2",
      "10\nabc\n5\nerrors: 2",
      "errors: 5",
      "10\n5\n3\nerrors: 0"
    ],
    answer: 0, level: "hard", topic: "try in a loop"
  },
  {
    q: "What is printed?\n\ntry:\n    a = int(input())\n    b = int(input())\n    print(a / b)\nexcept (ValueError, ZeroDivisionError) as e:\n    print('error:', e)\nfinally:\n    print('end')\n\n(user types: 10, then 0)",
    code: true,
    options: [
      "error: division by zero\nend",
      "error: invalid literal\nend",
      "0\nend",
      "Error and crash"
    ],
    answer: 0, level: "hard", topic: "Tuple of exceptions"
  }
];

const LETTERS = ['A','B','C','D'];
let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = Math.round(answered / questions.length * 100);
  document.getElementById('prog-text').textContent = `${answered} / ${questions.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  const correct = userAnswers.filter((a,i) => a === questions[i].answer).length;
  document.getElementById('score-pill').textContent = `${correct} correct`;
}

function render() {
  const q = questions[current];
  const answered = userAnswers[current] !== null;
  const userChoice = userAnswers[current];
  const isCorrect = userChoice === q.answer;

  let optionsHTML = q.options.map((opt, i) => {
    let cls = 'opt';
    if (answered) {
      if (i === q.answer) cls += ' reveal';
      if (i === userChoice && userChoice !== q.answer) cls += ' wrong';
      if (i === userChoice && userChoice === q.answer) cls += ' correct';
    }
    return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="choose(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>
      ${opt}
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    if (isCorrect) {
      feedbackHTML = `<div class="feedback correct-fb"><span class="fb-icon">✓</span> Correct!</div>`;
    } else {
      feedbackHTML = `<div class="feedback wrong-fb"><span class="fb-icon">✗</span> Wrong — the correct answer is <strong>${q.options[q.answer]}</strong></div>`;
    }
  }

  document.getElementById('q-view').innerHTML = `
    <div class="q-card">
      <div class="q-top">
        <span class="q-topic">${q.topic}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="q-number">${current+1} / ${questions.length}</span>
          <span class="badge ${q.level}">${q.level}</span>
        </div>
      </div>
      ${q.code
        ? `<div class="q-code">${q.q}</div>`
        : `<div class="q-text">${q.q}</div>`}
      <div class="options">${optionsHTML}</div>
      ${feedbackHTML}
    </div>`;

  document.getElementById('btn-back').disabled = current === 0;

  const isLast = current === questions.length - 1;
  const btnNext = document.getElementById('btn-next');
  if (isLast) {
    btnNext.textContent = 'See Results';
    btnNext.onclick = showResults;
  } else {
    btnNext.textContent = 'Next →';
    btnNext.onclick = goNext;
  }

  updateProgress();
}

function choose(i) {
  if (userAnswers[current] !== null) return;
  userAnswers[current] = i;
  render();
}

function goNext() {
  if (current < questions.length - 1) {
    current++;
    render();
  }
}

function go(dir) {
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

function showResults() {
  const correct = userAnswers.filter((a,i) => a === questions[i].answer).length;
  const wrong = userAnswers.filter((a,i) => a !== null && a !== questions[i].answer).length;
  const skipped = userAnswers.filter(a => a === null).length;
  const pct = Math.round(correct / questions.length * 100);
  let emoji = pct >= 85 ? '🏆' : pct >= 60 ? '👍' : '📚';
  let msg = pct >= 85 ? 'Excellent work!' : pct >= 60 ? 'Good effort, keep practicing!' : 'Keep studying — you got this!';

  document.getElementById('q-view').classList.add('hidden');
  document.getElementById('nav-bar').classList.add('hidden');
  document.getElementById('result-view').classList.remove('hidden');
  document.getElementById('result-view').innerHTML = `
    <div class="results">
      <div class="results-emoji">${emoji}</div>
      <div class="score-display">${correct}/${questions.length}</div>
      <div class="score-label">${pct}% · ${msg}</div>
      <div class="result-grid">
        <div class="stat-box"><div class="stat-val g">${correct}</div><div class="stat-label">CORRECT</div></div>
        <div class="stat-box"><div class="stat-val r">${wrong}</div><div class="stat-label">WRONG</div></div>
        <div class="stat-box"><div class="stat-val a">${skipped}</div><div class="stat-label">SKIPPED</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">Try Again</button>
    </div>`;
}

function restart() {
  current = 0;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('q-view').classList.remove('hidden');
  document.getElementById('nav-bar').classList.remove('hidden');
  document.getElementById('result-view').classList.add('hidden');
  document.getElementById('result-view').innerHTML = '';
  render();
}

render();
</script>
</body>
</html>
